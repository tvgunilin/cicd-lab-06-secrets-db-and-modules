# Mustry Academy — Lab 06 (secrets, migrations, modules & JARs)
# Three Ignition 8.3 gateways + one TimescaleDB with three logical databases:
#
#   gateway-loc    http://localhost:8088   bind-mounts ./projects + ./services/config
#                                          (working gateway — edits show
#                                           up immediately on disk)
#   gateway-dev    http://localhost:8089   projects/ + config/ bind-mounted from
#                                          ./gateways/dev, populated by deploy.yml
#   gateway-prod   http://localhost:8090   projects/ + config/ bind-mounted from
#                                          ./gateways/prod, populated by deploy.yml
#                                          (workflow_dispatch with target=prod)
#
#   timescaledb    localhost:5432          databases: ignition_loc, ignition_dev,
#                                          ignition_prd (one per env), plus the
#                                          read-only `reporting` login (db-init/)
#
# Run it:
#   cp .env.example .env
#   scripts/setup.sh           # or:  docker compose up -d
# Then:
#   open http://localhost:8088   (local)
#   open http://localhost:8089   (dev — empty until the first deploy run)
#   open http://localhost:8090   (prod — empty until the first deploy run)
#
# NOTE (Part 1A of the lab): the database passwords below enter the containers
# as ENVIRONMENT VARIABLES — anyone who can `docker inspect` reads them in
# plaintext. Part 1 of the lab moves them to file-based secrets (a top-level
# `secrets:` block + POSTGRES_PASSWORD_FILE + files under ./secrets/). That
# edit is the exercise, so this file ships WITHOUT it.

---
# YAML anchors for the bits that don't differ across the three gateways. Each
# service merges these in and overrides the parts that do (ports, admin creds,
# the gateway name passed to the wrapper, volumes).
x-ignition-env: &ignition-env
  ACCEPT_IGNITION_EULA: "Y"
  IGNITION_EDITION: standard
  GATEWAY_MODULES_ENABLED: >-
    com.inductiveautomation.alarm-notification,
    com.inductiveautomation.eventstream,
    com.inductiveautomation.historian,
    com.inductiveautomation.connectors.kafka,
    com.inductiveautomation.opcua.drivers.modbus,
    com.inductiveautomation.opcua,
    com.inductiveautomation.perspective,
    com.inductiveautomation.reporting,
    com.inductiveautomation.historian.sql,
    com.inductiveautomation.symbol-factory,
    com.inductiveautomation.opcua.drivers.tcpudp,
    com.inductiveautomation.webdev,
    com.inductiveautomation.jdbc.postgresql,
    com.mussonindustrial.embr.charts,
    com.mussonindustrial.embr.periscope,
    com.mustry.historian.timescaledb,
    com.cirruslink.mqtt.engine.gateway
  # Embr-Periscope is the spare module Part 3 installs. It is pre-accepted
  # in the ACCEPT_MODULE_* lists below (license + cert) AND listed in
  # GATEWAY_MODULES_ENABLED — but it ships WITHOUT a services/modules.json
  # entry, so the .modl sitting in third-party-modules/ is not loaded on a
  # fresh boot (no manifest entry => not installed). Part 3 adds the minimal
  # entry (filename + onStartup); because acceptance is already in these env
  # vars, the gateway installs it headlessly on the next boot and WRITES the
  # derived certFingerprint + licenseAgreementHash back into modules.json —
  # which the student then commits so image-based/fresh gateways accept it
  # from config alone. That derivation is the whole point of Part 3.
  ACCEPT_MODULE_LICENSES: >-
    com.mussonindustrial.embr.charts,
    com.mussonindustrial.embr.periscope,
    com.mustry.historian.timescaledb,
    com.cirruslink.mqtt.engine.gateway
  ACCEPT_MODULE_CERTS: >-
    com.mussonindustrial.embr.charts,
    com.mussonindustrial.embr.periscope,
    com.mustry.historian.timescaledb,
    com.cirruslink.mqtt.engine.gateway
  GATEWAY_RESTORE_DISABLED: "true"
  GATEWAY_NETWORK_ENABLED: "true"
  TZ: "Europe/Brussels"

x-ignition-resources: &ignition-resources
  deploy:
    resources:
      limits:
        memory: 1G
      reservations:
        memory: 512M
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

x-ignition-healthcheck: &ignition-healthcheck
  test: ["CMD", "curl", "-fsS", "http://localhost:8088/StatusPing"]
  interval: 30s
  timeout: 10s
  retries: 10
  start_period: 90s

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  reporting_password:
    file: ./secrets/reporting_password.txt

services:
  # --- local gateway: edits on the host show up here immediately --------------
  gateway-loc:
    image: inductiveautomation/ignition:8.3.6
    container_name: lab06-gateway-loc
    hostname: lab06-gateway-loc
    user: root
    restart: unless-stopped
    ports:
      - "8088:8088"
      - "8060:8060"
    volumes:
      - gateway-local-data:/usr/local/bin/ignition/data
      - ./projects:/usr/local/bin/ignition/data/projects
      - ./services/config:/usr/local/bin/ignition/data/config
      - ./services/modules.json:/usr/local/bin/ignition/data/modules.json
      - ./third-party-modules:/third-party-modules
    environment:
      <<: *ignition-env
      GATEWAY_ADMIN_USERNAME: "${GATEWAY_ADMIN_USERNAME_LOCAL:-admin}"
      GATEWAY_ADMIN_PASSWORD: "${GATEWAY_ADMIN_PASSWORD_LOCAL:-password}"
      # The LOCAL gateway runs with CUSTOM secrets-management keys
      # (services/config/ignition/keys/ — committed, dummy lab keys) instead
      # of the default key every Ignition installation shares. That's what
      # makes the committed embedded ciphertexts decrypt HERE and nowhere
      # else: .deployignore keeps the keys out of the deploy payload, so
      # dev/prod fall back to their own keys and the connections fault —
      # the warm-up's whole point. This passphrase unlocks the root key.
      IGNITION_ROOT_KEY_PASSWORD: "${IGNITION_ROOT_KEY_PASSWORD:-lab06-root-key-pass}"
    command: >
      -n lab06-local
      -m 1024
      --
      wrapper.java.initmemory=256
      -Dignition.allowunsignedmodules=true
      -Dignition.gateway.externalModulesFolder=/third-party-modules
      -Dignition.config.mode=loc
    healthcheck: *ignition-healthcheck
    <<: *ignition-resources
    networks:
      - default
    depends_on:
      timescaledb:
        condition: service_healthy
    secrets: [postgres_password, reporting_password]

  # --- dev gateway: populated by deploy.yml (push to main) -------------------
  gateway-dev:
    image: inductiveautomation/ignition:8.3.6
    container_name: lab06-gateway-dev
    hostname: lab06-gateway-dev
    user: root
    restart: unless-stopped
    ports:
      - "8089:8088"
      - "8061:8060"
    volumes:
      - gateway-dev-data:/usr/local/bin/ignition/data
      # projects/ and config/ are bind-mounted from ./gateways/dev (gitignored,
      # created by setup.sh) so you can SEE what a deploy shipped straight from
      # your laptop: `ls gateways/dev/projects`. The rest of data/ (internal db,
      # var/, certificates/) stays in the named volume above.
      - ./gateways/dev/projects:/usr/local/bin/ignition/data/projects
      - ./gateways/dev/config:/usr/local/bin/ignition/data/config
      # The module manifest is a PER-GATEWAY copy (seeded by setup.sh,
      # updated by deploy.yml) — NOT the repo's services/modules.json, which
      # only the local gateway mounts. If dev shared the working-tree file,
      # a local edit would leak into dev's next boot without a deploy, and
      # the deploy workflow couldn't tell "already deployed" from "changed".
      - ./gateways/dev/modules.json:/usr/local/bin/ignition/data/modules.json
      - ./third-party-modules:/third-party-modules
    environment:
      <<: *ignition-env
      GATEWAY_ADMIN_USERNAME: "${GATEWAY_ADMIN_USERNAME_DEV:-admin}"
      GATEWAY_ADMIN_PASSWORD: "${GATEWAY_ADMIN_PASSWORD_DEV:-password}"
    command: >
      -n lab06-dev
      -m 1024
      --
      wrapper.java.initmemory=256
      -Dignition.allowunsignedmodules=true
      -Dignition.gateway.externalModulesFolder=/third-party-modules
      -Dignition.config.mode=dev
    healthcheck: *ignition-healthcheck
    <<: *ignition-resources
    networks:
      - default
    depends_on:
      timescaledb:
        condition: service_healthy

  # --- prod gateway: populated by deploy.yml (dispatch, target=prod) ------------------
  gateway-prod:
    image: inductiveautomation/ignition:8.3.6
    container_name: lab06-gateway-prod
    hostname: lab06-gateway-prod
    user: root
    restart: unless-stopped
    ports:
      - "8090:8088"
      - "8062:8060"
    volumes:
      - gateway-prod-data:/usr/local/bin/ignition/data
      # Same pattern as dev: deployed files are visible on the host under
      # ./gateways/prod (gitignored, created by setup.sh).
      - ./gateways/prod/projects:/usr/local/bin/ignition/data/projects
      - ./gateways/prod/config:/usr/local/bin/ignition/data/config
      # Per-gateway manifest copy — same reasoning as dev.
      - ./gateways/prod/modules.json:/usr/local/bin/ignition/data/modules.json
      - ./third-party-modules:/third-party-modules
    environment:
      <<: *ignition-env
      GATEWAY_ADMIN_USERNAME: "${GATEWAY_ADMIN_USERNAME_PROD:-admin}"
      GATEWAY_ADMIN_PASSWORD: "${GATEWAY_ADMIN_PASSWORD_PROD:-password}"
    command: >
      -n lab06-prod
      -m 1024
      --
      wrapper.java.initmemory=256
      -Dignition.allowunsignedmodules=true
      -Dignition.gateway.externalModulesFolder=/third-party-modules
      -Dignition.config.mode=prd
    healthcheck: *ignition-healthcheck
    <<: *ignition-resources
    networks:
      - default
    depends_on:
      timescaledb:
        condition: service_healthy

  # --- shared TimescaleDB with three logical databases ----------------------
  # POSTGRES_DB is the database created automatically at first init. The init
  # script under ./db-init/ (mounted below) creates the other two so each
  # gateway can point at its own database, plus the read-only `reporting`
  # login used by the TimescaleDB_Reports gateway connection.
  #
  # Both passwords below are plain environment variables — the rung-1 leak
  # Part 1A of the lab starts from (`docker inspect lab06-timescaledb | grep
  # PASSWORD`). The db-init script also understands REPORTING_PASSWORD_FILE,
  # so the same _FILE convention as POSTGRES_PASSWORD_FILE works once you
  # move to file-based secrets.
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: lab06-timescaledb
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"
    secrets: [postgres_password]
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-ignition}"
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password  # replaces POSTGRES_PASSWORD
      POSTGRES_DB: ignition_loc
      REPORTING_PASSWORD_FILE: /run/secrets/reporting_password   # replaces REPORTING_PASSWORD
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ignition}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - default

  # --- self-hosted GitHub Actions runner -------------------------------------
  # Auto-registers against the repo set in RUNNER_REPO_URL using a GitHub
  # Personal Access Token (RUNNER_GITHUB_PAT, must have `repo` scope). The
  # image uses that PAT to fetch its own short-lived registration token, so
  # you never mint one by hand. Reuse the same PAT you created in Lab 04.
  #
  # The runner sits on the lab's compose network, so it reaches the gateways by
  # service name (gateway-loc, gateway-dev, gateway-prod) — see the
  # IGNITION_URL defaults in .github/workflows/deploy.yml.
  #
  # Why /var/run/docker.sock is mounted: deploy.yml uses
  # `docker cp` and `docker exec` to push project files INTO the dev/prod
  # gateway containers. That requires the runner to talk to the host's
  # Docker daemon. Lab convenience, NOT a production pattern.
  github-runner:
    image: myoung34/github-runner:latest
    container_name: lab06-runner
    hostname: lab06-runner
    restart: unless-stopped
    environment:
      REPO_URL: "${RUNNER_REPO_URL}"
      ACCESS_TOKEN: "${RUNNER_GITHUB_PAT}"
      RUNNER_NAME: "${RUNNER_NAME:-lab06-runner}"
      RUNNER_SCOPE: repo
      LABELS: "self-hosted,lab06"
      # No EPHEMERAL here on purpose: the image treats ANY non-empty value
      # (even "false") as "enable --ephemeral". Leave it unset for a
      # persistent runner.
      DISABLE_AUTO_UPDATE: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - default

volumes:
  gateway-local-data:
  gateway-dev-data:
  gateway-prod-data:
  timescaledb-data:
